<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive Expenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Open+Sauce+Sans:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{color-scheme:light}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13.5px;line-height:1.5;background:#f2f2f2;color:#111;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.layout{display:flex;height:100vh;overflow:hidden}
.sb{width:190px;min-width:190px;background:#0d0d0d;color:#fff;display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 12px;border-bottom:1px solid #1e1e1e}
.sb-logo{display:flex;align-items:center;gap:9px}
.sb-tag{font-size:9.5px;color:#444;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-top:4px}
.sb-nav{flex:1;padding:10px 7px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:6px;cursor:pointer;color:#666;font-size:12.5px;font-weight:500;margin-bottom:2px;transition:all .15s;user-select:none;position:relative}
.ni:hover{background:#1a1a1a;color:#ddd}
.ni.on{background:rgba(8,123,122,.15);color:#087b7a}
.nb{margin-left:auto;background:#087b7a;color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:100px}
.nb-red{background:#dc2626}
.sb-foot{padding:10px 14px;border-top:1px solid #191919;font-size:10px;color:#2a2a2a}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tbar{background:#fff;padding:0 20px;height:52px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbar-t{font-size:15px;font-weight:900;letter-spacing:-.02em}
.tbar-s{font-size:11px;color:#888;margin-top:1px}
.ct{flex:1;overflow-y:auto;padding:16px 20px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:14px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:12px 14px}
.s-lbl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:3px}
.s-val{font-size:19px;font-weight:900;line-height:1.1;letter-spacing:-.02em}
.s-val.pk{color:#087b7a}.s-val.tl{color:#5e7a00}.s-val.bk{color:#111}
.s-sub{font-size:10.5px;color:#aaa;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;outline:none;font-family:inherit;white-space:nowrap;transition:all .15s}
.bp{background:#087b7a;color:#fff}.bp:hover{background:#065f5e}
.bs{background:#f3f3f3;color:#333;border:1px solid #e0e0e0}.bs:hover{background:#e8e8e8}
.bg{background:transparent;color:#666}.bg:hover{background:#f0f0f0;color:#333}
.bd{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.bd:hover{background:#fee2e2}
.bt{background:#e6f4f4;color:#087b7a;border:1px solid #b3d9d8}.bt:hover{background:#d0eceb}
.btn-sm{padding:4px 10px;font-size:11.5px;border-radius:5px}
.btn-xs{padding:2px 7px;font-size:11px;border-radius:4px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.fl{font-size:10px;font-weight:700;color:#555;letter-spacing:.07em;text-transform:uppercase}
.fi{background:#fff;border:1px solid #d0d0d0;border-radius:6px;padding:7px 10px;font-size:13.5px;color:#111;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:#087b7a;box-shadow:0 0 0 2px rgba(8,123,122,.08)}
.fi::placeholder{color:#bbb}
.fe{font-size:11px;color:#dc2626;margin-top:2px}
.seg{display:flex;background:#f3f3f3;border:1px solid #e0e0e0;border-radius:6px;padding:2px;gap:2px}
.so{flex:1;padding:5px 8px;text-align:center;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;color:#666;transition:all .15s;user-select:none}
.so.on{background:#087b7a;color:#fff}
.so:not(.on):hover{background:#e8e8e8;color:#333}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#888;border-bottom:1px solid #e5e5e5;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafafa}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bpk{background:#e6f4f4;color:#087b7a}.btl{background:#f2f5d0;color:#5e7a00}.bgr{background:#f0fdf4;color:#16a34a}.bam{background:#fffbeb;color:#d97706}.bgy{background:#f3f3f3;color:#888}.brd{background:#fef2f2;color:#dc2626}
.pr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.pn{font-size:10.5px;color:#bbb;width:16px;text-align:right;flex-shrink:0}
.pi{flex:1}
.ps{width:72px;flex-shrink:0;text-align:right}
.pp{font-size:12px;color:#888;flex-shrink:0}
.prm{background:none;border:none;cursor:pointer;color:#ccc;padding:4px;border-radius:4px;display:flex;align-items:center;transition:color .15s;flex-shrink:0}
.prm:hover{color:#dc2626}
.pt{padding:7px 11px;border-radius:6px;font-size:12px;font-weight:600;display:flex;align-items:justify-content:space-between;margin-bottom:8px}
.pt.ok{background:#f0fdf4;color:#16a34a}.pt.warn{background:#fffbeb;color:#d97706}.pt.over{background:#fef2f2;color:#dc2626}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.toast{position:fixed;top:12px;right:12px;background:#111;color:#fff;padding:9px 14px;border-radius:7px;font-size:12.5px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.empty{text-align:center;padding:36px 16px}
.ei{font-size:28px;margin-bottom:8px;opacity:.35}.et{font-size:13px;font-weight:600;color:#888;margin-bottom:3px}.es{font-size:11.5px;color:#bbb}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.st{font-size:13.5px;font-weight:900;letter-spacing:-.02em}.ss{font-size:11px;color:#888;margin-top:1px}
.cb{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-bottom:1px solid #f0f0f0}
.cb:last-child{border-bottom:none}
.cb input[type=checkbox]{accent-color:#087b7a;width:13px;height:13px;margin-top:2px;flex-shrink:0;cursor:pointer}
.cbl{flex:1;cursor:pointer}.cbm{font-size:12.5px;font-weight:500}.cbs{font-size:11px;color:#888;margin-top:1px}.cba{font-size:12.5px;font-weight:700;color:#087b7a;flex-shrink:0}
.rc{background:#fff;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:10px;overflow:hidden}
.rc-h{padding:12px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.rc-b{padding:12px 14px}
.rtots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.rtot{background:#f8f8f8;border-radius:6px;padding:10px}
.rtl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:2px}
.rtv{font-size:18px;font-weight:800}
.dbar{background:#e6f4f4;border:1px solid #b3d9d8;border-radius:6px;padding:9px 13px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:#888;flex-wrap:wrap;gap:7px}
.divider{height:1px;background:#f0f0f0;margin:14px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:10px;max-width:780px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{padding:16px 20px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-body{padding:20px;font-family:Arial,sans-serif;font-size:11pt;color:#000}
.report-tbl{width:100%;border-collapse:collapse;font-size:10.5pt;margin:14px 0}
.report-tbl th{background:#000;color:#fff;font-weight:bold;padding:7px 10px;border:1px solid #ccc;font-size:10pt}
.report-tbl td{padding:7px 10px;border:1px solid #ccc;vertical-align:top}
.wire-tbl{border-collapse:collapse;width:100%;margin-top:10px}
.wire-tbl td{padding:5px 0;border-bottom:1px solid #eee;font-size:10.5pt}
.wire-tbl td:first-child{font-weight:bold;width:200px}
.ml-a{margin-left:auto}
.mt-3{margin-top:12px}.mt-2{margin-top:8px}.mb-3{margin-bottom:12px}
.flex{display:flex}.aic{align-items:center}.gap2{gap:8px}.fw7{font-weight:700}
.text-muted{color:#888}.text-sm{font-size:11.5px}
/* Payment type toggle */
.ptt{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:14px}
.pto{padding:12px 14px;cursor:pointer;transition:all .15s;user-select:none;border-right:1px solid #e0e0e0}
.pto:last-child{border-right:none}
.pto.on{background:#e6f4f4}
.pto:not(.on){background:#fafafa}
.pto:not(.on):hover{background:#f3f3f3}
.pto-lbl{font-size:13px;font-weight:700;color:#333}
.pto.on .pto-lbl{color:#087b7a}
.pto-sub{font-size:11px;color:#888;margin-top:2px}
/* Invoice upload */
.inv-area{border:2px dashed #d0d0d0;border-radius:7px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s;background:#fafafa}
.inv-area:hover{border-color:#087b7a;background:#f0fbfb}
.inv-area.dragging{border-color:#087b7a;background:#e6f4f4;border-style:solid}
.inv-area input{display:none}
.inv-name{background:#e6f4f4;color:#087b7a;border:1px solid #b3d9d8;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
/* Pending items */
.pend-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:10px;overflow:hidden}
.pend-h{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.pend-meta{font-size:11px;color:#888;margin-top:3px}
.pend-inv{border-top:1px solid #f0f0f0;padding:10px 14px;background:#fafafa}
/* Note */
.note-box{background:#fffdf0;border:1px solid #f0e68c;border-radius:6px;padding:7px 10px;font-size:12px;color:#7a6500;margin-top:4px}

/* ── BRAND PASS ───────────────────────────────────── */
/* Open Sauce Sans, kerning -65 on body/headers, -55 on sub-headers, */
/* full stops after large titles, citron secondary accent. */
/* Casing follows the source (Title Case for headers, sentence case for body); */
/* CSS only forces UPPERCASE on the small sub-header tier. */
:root{--teal:#087b7a;--teal-deep:#065f5e;--teal-tint:#e6f4f4;--citron:#c7c804;--citron-dark:#8a8b03;--citron-tint:#fbfbcd;--citron-edge:#e9eaa6}
body{font-family:'Open Sauce Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-weight:500;letter-spacing:-0.065em;font-feature-settings:"tnum" 1}
input,select,textarea,button{font-family:inherit;letter-spacing:inherit}
/* Large headers — Title Case in source, tight kerning, full stop after */
.tbar-t,.st,.et{font-weight:900;letter-spacing:-0.065em}
.tbar-t{font-size:18px}
.st{font-size:15px}
/* Numeric large values keep weight 900; loosen kern slightly so digits breathe */
.s-val{font-weight:900;letter-spacing:-0.04em}
/* Small uppercase sub-headers — kerning -55, Medium weight */
.sb-tag,.s-lbl,.fl,.rtl{letter-spacing:-0.055em;font-weight:500}
/* Badges — small UPPERCASE labels */
.badge{text-transform:uppercase;letter-spacing:-0.055em;font-weight:700;font-size:9.5px;padding:3px 8px}
/* Citron-accent classes */
.btbd{background:var(--citron-tint);color:var(--citron-dark);border:1px solid var(--citron-edge)}
.bcit{background:var(--citron-tint);color:var(--citron-dark);border:1px solid var(--citron-edge)}
.bcit:hover{background:#f1f1a0}
/* USD accumulated value picks up citron rather than the old olive */
.s-val.tl{color:var(--citron-dark)}
/* Slight density polish */
.stat{padding:14px 16px}
.tbar{padding:0 22px;height:54px}
</style>
</head>

// Auto-save state to localStorage on every mutation, restore on load.
// Note: invoice files are base64 data URLs and can fill the ~5MB quota
// quickly; saveState() will warn via toast if that happens, but the
// in-memory state survives for the session — Export JSON is the safety
// net for big invoice attachments.
const STORAGE_KEY='hive-expenses-state-v1';
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({expenses:S.expenses,runs:S.runs,sheetsUrl:S.sheetsUrl}));
  }catch(err){
    console.warn('saveState failed:',err);
    showToast('⚠ Couldn’t auto-save — storage may be full. Export JSON.');
  }
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(Array.isArray(d.expenses))S.expenses=d.expenses;
    if(Array.isArray(d.runs))S.runs=d.runs;
    if(typeof d.sheetsUrl==='string')S.sheetsUrl=d.sheetsUrl;
  }catch(err){
    console.warn('loadState failed:',err);
  }
}
// Treat undefined/true as "splits assigned" for backward compat with
// expenses saved before the splitsAssigned flag existed.
const splitsReady=ex=>ex.splitsAssigned!==false;

function freshForm(init){
  if(init)return{...init,_isEdit:true,splitsAssigned:init.splitsAssigned!==false,participants:(init.participants||[]).map(p=>({...p,id:uid()})),errors:{}};
  return{_isEdit:false,id:null,paymentType:'paid',artistName:'',expenseDescription:'',datePaid:todayStr(),amount:'',currency:'GBP',recoupablePercent:100,splitsAssigned:true,participants:[{id:uid(),name:'',share:''}],methodPaid:'',invoiceFile:null,note:'',errors:{},saveAnother:false};
}

function getParticipantNames(){const n=new Set();S.expenses.forEach(ex=>ex.participants?.forEach(p=>{if(p.name?.trim())n.add(p.name.trim())}));return[...n].sort();}
function getArtistNames(){return[...new Set(S.expenses.map(ex=>ex.artistName).filter(Boolean))];}

  {id:'add',label:'Add Payment',ic:'➕'},

  {id:'pending',label:'Needs Paying',ic:'💳',isPending:true},
  {id:'runs',label:'Payment Runs',ic:'📄'},
];
const PAGE={
  dashboard:['Dashboard.','Overview of your payments'],

  log:['Payments Log.','All recorded payments'],
  pending:['Needs Paying.','Pending payment requests'],

function renderNav(){

    return`<div class="ni${S.view===v.id?' on':''}" data-nav="${v.id}"><span style="font-size:12px">${v.ic}</span>${v.label}${badge}</div>`;
  }).join('');
}

// Push/replace browser history so back & forward buttons walk through views.
// Edit-form payloads are kept in a tiny in-memory map keyed by a token in the
// hash, so the URL stays clean and we don't have to JSON-serialise into it.
const _historyInits={};
function setView(v,init,opts={}){
  S.view=v;
  if(v==='add')S.form=freshForm(init||null);
  if(v==='runs'){S.creating=false;S.runForm={name:'',selectedIds:[]};}
  renderAll();
  if(opts.skipHistory)return;
  let hash='#'+v;
  if(v==='add'&&init){
    const tok=Date.now().toString(36);
    _historyInits[tok]=init;
    hash+='?init='+tok;
  }
  if(location.hash===hash)return;
  history.pushState({view:v,init:init?'_inited':null},'',hash);
}
function _viewFromHash(){
  const m=(location.hash||'').match(/^#([^?]+)(?:\?init=(.+))?$/);
  if(!m)return{view:'dashboard',init:null};
  const view=m[1];
  const init=m[2]?_historyInits[m[2]]||null:null;
  return{view,init};
}
window.addEventListener('popstate',()=>{
  const{view,init}=_viewFromHash();
  setView(view,init,{skipHistory:true});
});

function renderAll(){
  renderNav();
  const[title,sub]=PAGE[S.view]||['',''];
  e('page-title').textContent=S.view==='add'?(S.form?._isEdit?'Edit Payment.':'Add Payment.'):title;
  e('page-sub').textContent=S.view==='log'?`${S.expenses.filter(ex=>ex.status==='paid').length} paid entries`:sub;
  let act='';
  if(S.view==='dashboard')act=`<button class="btn bp btn-sm" onclick="setView('add')">＋ Add Payment</button>`;
  if(S.view==='log')act=`<button class="btn bp btn-sm" onclick="setView('add')">＋ Add Payment</button>`;
  if(S.view==='pending')act=`<button class="btn bp btn-sm" onclick="setView('add')">＋ Request Payment</button>`;
  e('tbar-action').innerHTML=act;
  const views={dashboard:renderDash,add:renderAddForm,log:renderLog,pending:renderPending,runs:renderRuns};
  (views[S.view]||renderDash)();
}

  // % stays attached to each expense and shows in the row badge, the docx
  // output, and the Sheets sync payload.
  const gbp=paid.filter(ex=>ex.currency==='GBP').reduce((s,ex)=>s+(ex.amount||0),0);
  const usd=paid.filter(ex=>ex.currency==='USD').reduce((s,ex)=>s+(ex.amount||0),0);

      html+=`<tr>
        <td style="color:#888;font-size:11.5px;white-space:nowrap">${fmtDate(ex.datePaid||ex.date)}</td>
        <td style="font-weight:600">${esc(ex.artistName)}</td>
        <td style="color:#888">${esc(ex.expenseDescription)}</td>
        <td style="font-weight:700;color:#087b7a">${fmtAmt(ex.recoupableAmount,ex.currency)}</td>
        <td><span class="badge ${ex.status==='pending'?'brd':run?'bgr':'bgy'}">${ex.status==='pending'?'Needs Paying':run?'In Run':'Paid'}</span></td>
        <td><div class="flex gap2" style="justify-content:flex-end">
          <button class="btn bg btn-xs" onclick="setView('add',${exJson})" title="Edit">✎</button>

// #content is a persistent element — its children are replaced on render
// but the element itself isn't, so we only need to attach this listener
// once. Previously this was called on every renderAddForm(), which stacked
// up duplicate listeners on every re-render.
let _formListenersAttached=false;
function attachFormListeners(){
  if(_formListenersAttached)return;
  _formListenersAttached=true;
  e('content').addEventListener('input',ev=>{
    const field=ev.target.dataset.field;
    if(!field||!S.form)return;
    const v=ev.target.value;
    if(field==='artistName')S.form.artistName=v;
    else if(field==='expenseDescription')S.form.expenseDescription=v;
    else if(field==='datePaid')S.form.datePaid=v;
    else if(field==='amount')S.form.amount=v;
    else if(field==='methodPaid')S.form.methodPaid=v;
    else if(field==='note')S.form.note=v;
    else if(field.startsWith('pname-')){const i=parseInt(field.split('-')[1]);if(S.form.participants[i])S.form.participants[i].name=v;}
    else if(field.startsWith('pshare-')){const i=parseInt(field.split('-')[1]);if(S.form.participants[i]){S.form.participants[i].share=v;updatePartTotal();}}
  });
}

function updatePartTotal(){
  const f=S.form;if(!f)return;
  const total=f.participants.reduce((s,p)=>s+(parseFloat(p.share)||0),0);
  const el=e('part-total');if(!el)return;
  const cls=Math.abs(total-100)<0.001?'ok':total>100?'over':'warn';
  const msg=Math.abs(total-100)<0.001?'✓ 100% allocated':total>100?`⚠ Over by ${(total-100).toFixed(4)}%`:`${(100-total).toFixed(4)}% remaining`;
  el.className=`pt ${cls}`;el.innerHTML=`<span>${msg}</span><strong>${total.toFixed(4)}%</strong>`;
}

function setFF(field,val){if(!S.form)return;syncFormInputs();S.form[field]=val;renderAddForm();}
function toggleSplitsAssigned(){if(!S.form)return;syncFormInputs();S.form.splitsAssigned=!S.form.splitsAssigned;renderAddForm();}
function addParticipant(){if(!S.form)return;syncFormInputs();S.form.participants.push({id:uid(),name:'',share:''});renderAddForm();setTimeout(()=>{const inputs=document.querySelectorAll('[data-field^="pname-"]');if(inputs.length)inputs[inputs.length-1].focus();},50);}
function removeParticipant(idx){if(!S.form)return;syncFormInputs();S.form.participants.splice(idx,1);renderAddForm();}
function clearInvoice(){if(S.form){S.form.invoiceFile=null;renderAddForm();}}

function handleInvoiceUpload(ev){
  const file=ev.target.files[0];if(!file)return;
  _readInvoiceFile(file);
}
function handleInvoiceDrop(ev){
  ev.preventDefault();
  const file=ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0];
  if(!file)return;
  _readInvoiceFile(file);
}
function _readInvoiceFile(file){
  const reader=new FileReader();
  reader.onload=evt=>{if(S.form){S.form.invoiceFile={name:file.name,data:evt.target.result,type:file.type};renderAddForm();}};
  reader.readAsDataURL(file);
}

function syncFormInputs(){
  if(!S.form)return;
  S.form.participants.forEach((p,i)=>{
    const n=document.querySelector(`[data-field="pname-${i}"]`);
    const s=document.querySelector(`[data-field="pshare-${i}"]`);
    if(n)p.name=n.value;if(s)p.share=s.value;
  });
  ['f-artist','f-desc','f-date','f-amount','f-method','f-note'].forEach(id=>{
    const el=e(id);if(!el)return;
    const m={['f-artist']:'artistName',['f-desc']:'expenseDescription',['f-date']:'datePaid',['f-amount']:'amount',['f-method']:'methodPaid',['f-note']:'note'};
    if(m[id])S.form[m[id]]=el.value;
  });
}

function submitForm(){
  if(!S.form)return;
  syncFormInputs();
  const f=S.form;const errs={};
  if(!f.artistName.trim())errs.artistName='Required';
  if(!f.expenseDescription.trim())errs.expenseDescription='Required';
  if(!f.amount||isNaN(f.amount)||parseFloat(f.amount)<=0)errs.amount='Enter a valid amount';
  // Skip participant validation when splits are deliberately deferred.
  if(f.splitsAssigned){
    if(f.participants.length===0)errs.participants='Add at least one participant';
    if(f.participants.some(p=>!p.name.trim()))errs.participants='All participants need a name';
    const total=f.participants.reduce((s,p)=>s+(parseFloat(p.share)||0),0);
    if(Math.abs(total-100)>0.001)errs.partTotal=`Shares must total 100% (currently ${total.toFixed(4)}%)`;
  }
  if(f.paymentType==='pending'&&!f.invoiceFile)errs.invoiceFile='Please attach an invoice';
  if(Object.keys(errs).length>0){S.form.errors=errs;renderAddForm();return;}
  const recoupableAmount=parseFloat(f.amount)*f.recoupablePercent/100;
  const exp={
    id:f._isEdit?f.id:uid(),
    createdAt:f._isEdit?(f.createdAt||new Date().toISOString()):new Date().toISOString(),
    status:f.paymentType==='paid'?'paid':'pending',
    artistName:f.artistName.trim(),expenseDescription:f.expenseDescription.trim(),
    datePaid:f.paymentType==='paid'?f.datePaid:null,
    amount:parseFloat(f.amount),currency:f.currency,
    recoupablePercent:f.recoupablePercent,recoupableAmount,
    splitsAssigned:f.splitsAssigned!==false,
    participants:f.splitsAssigned===false?[]:f.participants.map(p=>({name:p.name.trim(),share:parseFloat(p.share)})),
    methodPaid:f.paymentType==='paid'?f.methodPaid:'',
    invoiceFile:f.paymentType==='pending'?f.invoiceFile:null,
    note:f.note.trim(),
    runId:f._isEdit?f.runId:null,
  };
  if(f._isEdit){S.expenses=S.expenses.map(ex=>ex.id===exp.id?exp:ex);saveState();showToast('Payment updated');setView('log');}
  else{S.expenses.push(exp);saveState();showToast(f.paymentType==='paid'?'Payment logged':'Payment request submitted');if(f.saveAnother){S.form=freshForm();renderAddForm();}else{setView(f.paymentType==='pending'?'pending':'dashboard');}}
}

// ── PAYMENTS LOG ──────────────────────────────────────────
function renderLog(){
  const{search,currency}=S.filters;
  let exps=S.expenses.filter(ex=>ex.status==='paid').filter(ex=>{
    if(currency!=='all'&&ex.currency!==currency)return false;
    if(search){const q=search.toLowerCase();return ex.artistName?.toLowerCase().includes(q)||ex.expenseDescription?.toLowerCase().includes(q)||ex.participants?.some(p=>p.name?.toLowerCase().includes(q));}
    return true;
  }).sort((a,b)=>new Date(b.datePaid||b.createdAt)-new Date(a.datePaid||a.createdAt));

  let html=`<div class="card" style="padding:10px 14px;margin-bottom:12px">

      <div class="seg" style="width:170px">${['all','GBP','USD'].map(c=>`<div class="so${currency===c?' on':''}" onclick="S.filters.currency='${c}';renderLog()">${c==='all'?'All':c}</div>`).join('')}</div>

  html+=`<div class="card" style="padding:0;overflow:hidden"><div class="tw"><table>
    <thead><tr><th>Date Paid</th><th>Artist</th><th>Description</th><th>Amount</th><th>Recoup%</th><th>Method</th><th>Participants</th><th>Run</th><th></th></tr></thead>
    <tbody>`;
  if(exps.length===0)html+=`<tr><td colspan="9" style="text-align:center;padding:30px;color:#bbb">No results match filters</td></tr>`;

      <td style="font-size:11px;color:#666">${ex.methodPaid||'—'}</td>
      <td>${splitsReady(ex)?`<button class="btn bg btn-xs" onclick="S.expandedId=S.expandedId==='${ex.id}'?null:'${ex.id}';renderLog()">${(ex.participants||[]).length}p ${isExp?'▲':'▼'}</button>`:`<span class="badge btbd" title="Splits not assigned yet">Splits TBD</span>`}</td>
      <td>${run?`<span class="badge bgr" style="font-size:10px;cursor:pointer" onclick="viewReport('${run.id}')">${esc(run.name.substring(0,18))}…</span>`:`<span class="badge bgy">Unsubmitted</span>`}</td>
      <td><div class="flex gap2">${!ex.runId?`<button class="btn bg btn-xs" onclick="setView('add',${JSON.stringify(ex).replace(/</g,'&lt;').replace(/"/g,'&quot;')})">Edit</button><button class="btn bd btn-xs" onclick="delPayment('${ex.id}')">🗑</button>`:''}</div></td>
    </tr>`;
    if(isExp){
      html+=`<tr style="background:#fafafa"><td colspan="9" style="padding:8px 10px 12px">`;
      if(ex.note)html+=`<div class="note-box" style="margin-bottom:8px">📝 ${esc(ex.note)}</div>`;
      html+=`<div style="font-size:10.5px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Participant Splits</div><div style="display:flex;gap:24px;flex-wrap:wrap">`;

  e('content').innerHTML=html;
}

function confirmMarkPaid(id){
  const dp=e('mp-date')?.value;const mp=e('mp-method')?.value;
  if(!dp){showToast('Please enter a date');return;}
  S.expenses=S.expenses.map(ex=>ex.id===id?{...ex,status:'paid',datePaid:dp,methodPaid:mp}:ex);
  saveState();
  closeModal();showToast('Payment marked as paid');renderNav();
  if(S.view==='pending')renderPending();
}

function delPayment(id){
  if(!confirm('Delete this payment?'))return;
  S.expenses=S.expenses.filter(ex=>ex.id!==id);
  saveState();
  showToast('Deleted');renderLog();
}

// ── PAYMENT RUNS ──────────────────────────────────────────
function renderRuns(){
  // Only paid expenses that have splits assigned can be added to a run —
  // the .docx report needs participant rows to be useful.
  const paidUnsubmitted=S.expenses.filter(ex=>ex.status==='paid'&&!ex.runId&&splitsReady(ex));
  const paidTbd=S.expenses.filter(ex=>ex.status==='paid'&&!ex.runId&&!splitsReady(ex));
  if(S.creating){
    const{name,selectedIds}=S.runForm;
    const sel=paidUnsubmitted.filter(ex=>selectedIds.includes(ex.id));
    const sGBP=sel.filter(ex=>ex.currency==='GBP').reduce((s,ex)=>s+ex.recoupableAmount,0);
    const sUSD=sel.filter(ex=>ex.currency==='USD').reduce((s,ex)=>s+ex.recoupableAmount,0);
    let html=`<div style="max-width:660px"><div class="card">
      <div class="fg"><label class="fl">Run Name *</label>
        <input class="fi" value="${esc(name)}" placeholder="e.g. Payment Request — Nov 2025" oninput="S.runForm.name=this.value;_syncRunButton()" id="run-name-input">
      </div>
      <div class="flex aic" style="justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700">Select Paid Expenses</div>
        <button class="btn bg btn-sm" onclick="S.runForm.selectedIds=S.runForm.selectedIds.length===${paidUnsubmitted.length}?[]:${JSON.stringify(paidUnsubmitted.map(ex=>ex.id))};renderRuns()">${selectedIds.length===paidUnsubmitted.length?'Deselect all':'Select all'}</button>
      </div>`;
    if(paidTbd.length>0)html+=`<div style="background:#fffdf0;border:1px solid #f0e68c;border-radius:6px;padding:8px 12px;font-size:11.5px;color:#7a6500;margin-bottom:10px">⏳ ${paidTbd.length} paid expense${paidTbd.length!==1?'s':''} excluded — splits not assigned yet. Edit them from the Payments Log to include them.</div>`;
    if(paidUnsubmitted.length===0)html+=`<div style="padding:16px;text-align:center;color:#bbb;font-size:12.5px">No unsubmitted paid expenses available</div>`;
    else{
      html+=`<div style="border:1px solid #e5e5e5;border-radius:7px;overflow:hidden">`;
      paidUnsubmitted.forEach(ex=>{const chk=selectedIds.includes(ex.id);
        html+=`<div class="cb"><input type="checkbox" ${chk?'checked':''} onchange="toggleRunExp('${ex.id}')">
          <label class="cbl" onclick="toggleRunExp('${ex.id}')"><div class="cbm">${esc(ex.artistName)} — ${esc(ex.expenseDescription)}</div><div class="cbs">${fmtDate(ex.datePaid)} · ${(ex.participants||[]).length}p · ${ex.recoupablePercent}% recoup · ${ex.methodPaid||'—'}</div></label>
          <span class="cba">${fmtAmt(ex.recoupableAmount,ex.currency)}</span></div>`;
      });
      html+=`</div>`;
    }
    if(sel.length>0)html+=`<div class="rtots mt-3">${sGBP>0?`<div class="rtot"><div class="rtl">GBP Recoupable</div><div class="rtv" style="color:#087b7a">${fmtAmt(sGBP,'GBP')}</div></div>`:''} ${sUSD>0?`<div class="rtot"><div class="rtl">USD Recoupable</div><div class="rtv" style="color:#5e7a00">${fmtAmt(sUSD,'USD')}</div></div>`:''}<div class="rtot"><div class="rtl">Items Selected</div><div class="rtv">${sel.length}</div></div></div>`;
    html+=`<div class="divider"></div><div class="flex gap2">
      <button class="btn bg" onclick="S.creating=false;renderRuns()">Cancel</button>
      <button id="create-run-btn" class="btn bp" ${!name.trim()||sel.length===0?'disabled':''} onclick="createRun()">✓ Create Run</button>
    </div></div></div>`;
    e('content').innerHTML=html;return;
  }
  let html=`<div class="sh"><div><div class="st">Payment Runs</div>${paidUnsubmitted.length>0?`<div class="ss">${paidUnsubmitted.length} unsubmitted paid expense${paidUnsubmitted.length!==1?'s':''}${paidTbd.length>0?` · ${paidTbd.length} pending splits`:''}</div>`:paidTbd.length>0?`<div class="ss">${paidTbd.length} paid expense${paidTbd.length!==1?'s':''} waiting on splits</div>`:''}</div>
    <button class="btn bp btn-sm" ${paidUnsubmitted.length===0?'disabled':''} onclick="S.creating=true;renderRuns()">＋ New Run</button></div>`;
  if(S.runs.length===0&&paidUnsubmitted.length===0)html+=`<div class="empty"><div class="ei">📄</div><div class="et">No runs yet.</div><div class="es">Log paid expenses first, then create a run</div></div>`;
  [...S.runs].reverse().forEach(run=>{
    const runExps=S.expenses.filter(ex=>ex.runId===run.id);
    html+=`<div class="rc"><div class="rc-h">
      <div><div style="font-weight:700">${esc(run.name)}</div><div style="font-size:11px;color:#888;margin-top:1px">Created ${fmtDate(run.createdAt?.split('T')[0])} · ${runExps.length} line items</div></div>
      <div class="flex gap2">
        <button class="btn bt btn-sm" onclick="viewReport('${run.id}')">👁 Preview</button>
        <button class="btn bp btn-sm" onclick="downloadDocx('${run.id}')">⬇ Download .docx</button>
        <button class="btn bd btn-sm" onclick="deleteRun('${run.id}')" title="Reverse this run and put its payments back to Unsubmitted">↶ Reverse</button>
      </div>
    </div><div class="rc-b"><div class="rtots">
      ${run.totalGBP>0?`<div class="rtot"><div class="rtl">GBP Recoupable</div><div class="rtv" style="color:#087b7a">${fmtAmt(run.totalGBP,'GBP')}</div></div>`:''}
      ${run.totalUSD>0?`<div class="rtot"><div class="rtl">USD Recoupable</div><div class="rtv" style="color:#5e7a00">${fmtAmt(run.totalUSD,'USD')}</div></div>`:''}
      <div class="rtot"><div class="rtl">Line Items</div><div class="rtv">${runExps.length}</div></div>
    </div></div></div>`;
  });
  e('content').innerHTML=html;
}

// Imperatively sync the Create Run button's disabled state when the name
// input changes. Pre-rendered `disabled` attribute would otherwise stay
// stale because we don't re-render on keystrokes (would lose focus).
function _syncRunButton(){
  const btn=document.getElementById('create-run-btn');
  if(btn)btn.disabled=!S.runForm.name.trim()||S.runForm.selectedIds.length===0;
}

function toggleRunExp(id){
  const ids=S.runForm.selectedIds;
  S.runForm.selectedIds=ids.includes(id)?ids.filter(x=>x!==id):[...ids,id];
  renderRuns();setTimeout(()=>{const inp=e('run-name-input');if(inp)inp.value=S.runForm.name;},10);
}

function deleteRun(runId){
  const run=S.runs.find(r=>r.id===runId);if(!run)return;
  const linked=S.expenses.filter(ex=>ex.runId===runId).length;
  if(!confirm(`Reverse "${run.name}"? ${linked} payment${linked!==1?'s':''} will return to Unsubmitted and the run will be removed.`))return;
  S.expenses=S.expenses.map(ex=>ex.runId===runId?{...ex,runId:null}:ex);
  S.runs=S.runs.filter(r=>r.id!==runId);
  saveState();
  showToast('Run reversed');
  renderRuns();
}

function createRun(){
  const{name,selectedIds}=S.runForm;
  if(!name.trim()||selectedIds.length===0)return;
  const sel=S.expenses.filter(ex=>selectedIds.includes(ex.id));
  const totalGBP=sel.filter(ex=>ex.currency==='GBP').reduce((s,ex)=>s+ex.recoupableAmount,0);
  const totalUSD=sel.filter(ex=>ex.currency==='USD').reduce((s,ex)=>s+ex.recoupableAmount,0);
  const run={id:uid(),createdAt:new Date().toISOString(),name:name.trim(),expenseIds:[...selectedIds],totalGBP,totalUSD};
  S.runs.push(run);
  S.expenses=S.expenses.map(ex=>selectedIds.includes(ex.id)?{...ex,runId:run.id}:ex);
  saveState();
  S.creating=false;S.runForm={name:'',selectedIds:[]};
  showToast('Run created');
  viewReport(run.id);
  renderRuns();
}

// ── DOCX EXPORT ───────────────────────────────────────────
function xmlEsc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function mkBdr(color,sz=6){return`<w:top w:val="single" w:sz="${sz}" w:space="0" w:color="${color}"/><w:left w:val="single" w:sz="${sz}" w:space="0" w:color="${color}"/><w:bottom w:val="single" w:sz="${sz}" w:space="0" w:color="${color}"/><w:right w:val="single" w:sz="${sz}" w:space="0" w:color="${color}"/>`;}
function mkNoBdr(){return`<w:top w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:left w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:bottom w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:right w:val="none" w:sz="0" w:space="0" w:color="auto"/>`;}

function mkCell(text,opts={}){
  const{bold=false,bg='',color='',w=0,align='left',bdr='',sz=20,vPad=80,hPad=120}=opts;
  let tcPr='';
  if(bg)tcPr+=`<w:shd w:val="clear" w:color="auto" w:fill="${bg}"/>`;
  if(bdr)tcPr+=`<w:tcBorders>${bdr}</w:tcBorders>`;
  if(w)tcPr+=`<w:tcW w:w="${w}" w:type="dxa"/>`;
  tcPr+=`<w:tcMar><w:top w:w="${vPad}" w:type="dxa"/><w:left w:w="${hPad}" w:type="dxa"/><w:bottom w:w="${vPad}" w:type="dxa"/><w:right w:w="${hPad}" w:type="dxa"/></w:tcMar>`;
  let rPr=`<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/>`;
  if(bold)rPr+='<w:b/>';
  if(color)rPr+=`<w:color w:val="${color}"/>`;
  const pPr=`<w:pPr><w:jc w:val="${align}"/><w:spacing w:after="0"/></w:pPr>`;
  return`<w:tc>${tcPr?`<w:tcPr>${tcPr}</w:tcPr>`:''}<w:p>${pPr}<w:r><w:rPr>${rPr}</w:rPr><w:t xml:space="preserve">${xmlEsc(text)}</w:t></w:r></w:p></w:tc>`;
}

function mkTbl(rows,colWidths,opts={}){
  const total=colWidths.reduce((s,w)=>s+w,0);
  const grid=colWidths.map(w=>`<w:gridCol w:w="${w}"/>`).join('');
  const insideBdr=opts.insideBdr||'<w:insideH w:val="none"/><w:insideV w:val="none"/>';
  return`<w:tbl><w:tblPr><w:tblW w:w="${total}" w:type="dxa"/><w:tblBorders>${insideBdr}</w:tblBorders><w:tblCellMar><w:top w:w="0" w:type="dxa"/><w:left w:w="0" w:type="dxa"/><w:bottom w:w="0" w:type="dxa"/><w:right w:w="0" w:type="dxa"/></w:tblCellMar></w:tblPr><w:tblGrid>${grid}</w:tblGrid>${rows}</w:tbl>`;
}

function mkRow(cells){return`<w:tr><w:trPr><w:cantSplit/></w:trPr>${cells}</w:tr>`;}

function mkPara(text,opts={}){
  const{bold=false,sz=20,before=0,after=120}=opts;
  let rPr=`<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/>`;
  if(bold)rPr+='<w:b/>';
  return`<w:p><w:pPr><w:spacing w:before="${before}" w:after="${after}"/></w:pPr><w:r><w:rPr>${rPr}</w:rPr><w:t xml:space="preserve">${xmlEsc(text)}</w:t></w:r></w:p>`;
}

function buildDocXml(run,runExps){
  // Content width: 9360 DXA (US Letter 8.5" - 2" margins)
  const noBdr=mkNoBdr();
  const blkBdr=mkBdr('000000',6);
  const gryBdr=mkBdr('CCCCCC',4);

  // 1. Artist/Service invisible table
  const artistTbl=mkTbl(
    mkRow(mkCell('Artist',{bold:true,w:2400,bdr:noBdr})+mkCell('',{w:800,bdr:noBdr})+mkCell('Service',{bold:true,w:2400,bdr:noBdr})+mkCell('',{w:3760,bdr:noBdr})),
    [2400,800,2400,3760]
  );

  // 2. CORE DISB ID box
  const coreRows=[['CORE DISB ID',''],['ACCT ENTRY DATE',''],['PAID DATE',''],['CASE#','']].map(([k,v])=>
    mkRow(mkCell(k,{bold:true,w:2520,bdr:blkBdr})+mkCell(v,{w:4000,bdr:blkBdr}))
  ).join('');
  const coreTbl=mkTbl(coreRows,[2520,4000]);

  // 3. Meta table
  const metaRows=[
    ['Payee:',''],['Pay To:','Hive Music Limited'],['Amount Paid by Position:','100%'],
    ['Payment Description:','Production Expenses'],["A\u0026R:",'Rick & Robin'],
    ['Artist:','Various'],['Album code:','Various']
  ].map(([k,v])=>mkRow(mkCell(k,{bold:true,w:2800,bdr:noBdr})+mkCell(v,{w:6560,bdr:noBdr}))).join('');
  const metaTbl=mkTbl(metaRows,[2800,6560]);

  // 4. Main expense table
  const colW=[3276,1685,1685,1123,1591];
  const hdrs=['Recoupable from:','Participation Share','Participation Amount','Recoupable %','Recoupable Amount'];
  const aligns=['left','right','left','center','right'];
  const hdrRow=mkRow(hdrs.map((h,i)=>mkCell(h,{bold:true,bg:'000000',color:'FFFFFF',w:colW[i],bdr:gryBdr,align:aligns[i]})).join(''));
  const dataRows=runExps.flatMap(ex=>(ex.participants||[]).map((p,i)=>{
    const isFirst=i===0;
    return mkRow(
      mkCell(p.name,{w:colW[0],bdr:gryBdr})+
      mkCell(p.share+'%',{w:colW[1],bdr:gryBdr,align:'right'})+
      mkCell('',{w:colW[2],bdr:gryBdr})+
      mkCell(isFirst?ex.recoupablePercent+'%':'',{w:colW[3],bdr:gryBdr,align:'center'})+
      mkCell(isFirst?fmtAmt(ex.recoupableAmount,ex.currency):'',{w:colW[4],bdr:gryBdr,align:'right',bold:isFirst})
    );
  })).join('');
  const mainTbl=mkTbl(hdrRow+dataRows,colW,{insideBdr:`<w:insideH w:val="single" w:sz="4" w:color="CCCCCC"/><w:insideV w:val="single" w:sz="4" w:color="CCCCCC"/>`});

  // 5. Wire details
  const wireRows=[
    ['Bank Name & Address:',''],['Account Number:',''],
    ['Swift Code/Routing Number:',''],['IBAN (international wires):','']
  ].map(([k,v])=>mkRow(mkCell(k,{bold:true,w:2800,bdr:`<w:bottom w:val="single" w:sz="4" w:color="DDDDDD"/><w:top w:val="none"/><w:left w:val="none"/><w:right w:val="none"/>`})+mkCell(v,{w:6560,bdr:`<w:bottom w:val="single" w:sz="4" w:color="DDDDDD"/><w:top w:val="none"/><w:left w:val="none"/><w:right w:val="none"/>`}))).join('');
  const wireTbl=mkTbl(wireRows,[2800,6560]);

  const body=[
    artistTbl,mkPara('',{after:100}),
    coreTbl,mkPara('',{after:100}),
    metaTbl,mkPara('',{after:100}),
    mainTbl,mkPara('',{after:100}),
    mkPara('Payment Method:',{bold:true,after:80}),
    mkPara('',{after:100}),
    mkPara('Wire Details:',{bold:true,after:80}),
    wireTbl
  ].join('');

  return`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>${body}
<w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/></w:sectPr>
</w:body></w:document>`;
}

async function downloadDocx(runId){
  const run=S.runs.find(r=>r.id===runId);if(!run)return;
  if(typeof JSZip==='undefined'){showToast('JSZip not loaded');return;}
  const runExps=S.expenses.filter(ex=>ex.runId===runId);
  const docXml=buildDocXml(run,runExps);
  const zip=new JSZip();
  zip.file('[Content_Types].xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>`);
  zip.folder('_rels').file('.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
  const word=zip.folder('word');
  word.folder('_rels').file('document.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`);
  word.file('document.xml',docXml);
  word.file('styles.xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>`);
  try{
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url=URL.createObjectURL(blob);
    // Strip filesystem-unsafe chars from the run name so e.g. a slash
    // doesn't produce a malformed download filename.
    const safeName=(run.name||'payment-run').replace(/[\\/:*?"<>|\x00-\x1f]/g,'_').trim().slice(0,100)||'payment-run';
    const a=document.createElement('a');a.href=url;a.download=`${safeName}.docx`;a.click();
    // Defer revoke — Firefox can race the download if revoke fires before
    // the browser starts the transfer.
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast('Document downloaded');
  }catch(err){showToast('Error generating document: '+err.message);}
}

// ── DATA / TOAST / MISC ───────────────────────────────────
function exportData(){
  const data=JSON.stringify({expenses:S.expenses,runs:S.runs,sheetsUrl:S.sheetsUrl},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='hive-expenses-backup.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('Data exported');
}

function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const d=JSON.parse(e.target.result);
      if(d.expenses)S.expenses=d.expenses;
      if(d.runs)S.runs=d.runs;
      if(d.sheetsUrl)S.sheetsUrl=d.sheetsUrl;
      saveState();
      showToast(`Imported ${S.expenses.length} expenses, ${S.runs.length} runs`);
      renderAll();
    }catch{showToast('Error reading file');}
  };
  reader.readAsText(file);
}

let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  e('toast-area').innerHTML=`<div class="toast">✓ ${msg}</div>`;
  toastTimer=setTimeout(()=>e('toast-area').innerHTML='',2800);
}

function toggleRecoupInfo(){const el=document.getElementById('recoup-info');if(el)el.style.display=el.style.display==='none'?'block':'none';}

function openSheetsSetup(){
  e('modal-area').innerHTML=`<div class="modal-bg" id="sheets-modal" onclick="if(event.target.id==='sheets-modal')closeModal()">
    <div class="modal" style="max-width:500px">
      <div class="modal-head"><div style="font-weight:700">Connect Google Sheets</div><button class="btn bg btn-sm" onclick="closeModal()">&#x2715;</button></div>
      <div style="padding:20px">
        <div class="fg"><label class="fl">Apps Script Web App URL</label>
          <input class="fi" id="sheets-url-input" value="${esc(S.sheetsUrl)}" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        <div style="background:#f8f8f8;border-radius:7px;padding:12px;font-size:12px;color:#555;margin-bottom:16px;line-height:1.6">
          <div style="font-weight:700;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Setup steps</div>
          <div>1. Open your Google Sheet → Extensions → Apps Script</div>
          <div>2. Paste the sync script → Save → Deploy as Web App</div>
          <div>3. Copy the /exec URL and paste above</div>
        </div>
        <div class="flex gap2" style="justify-content:flex-end">
          <button class="btn bg" onclick="closeModal()">Cancel</button>
          <button class="btn bp" onclick="saveSheetsUrl()">Save &amp; Sync Now</button>
        </div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{const inp=e('sheets-url-input');if(inp)inp.focus();},50);
}
function saveSheetsUrl(){
  const url=(e('sheets-url-input')?.value||'').trim();
  if(!url){showToast('Please enter a URL');return;}
  // Parse properly — substring matching lets a hostile URL like
  // https://evil.example/?x=script.google.com slip through.
  let host;
  try{host=new URL(url).hostname;}
  catch{showToast("That doesn't look like a valid URL");return;}
  if(host!=='script.google.com'){showToast("That doesn't look like an Apps Script URL");return;}
  S.sheetsUrl=url;saveState();closeModal();syncToSheets();
}
function syncToSheets(){
  if(!S.sheetsUrl){openSheetsSetup();return;}
  const paid=S.expenses.filter(ex=>ex.status==='paid');
  const pending=S.expenses.filter(ex=>ex.status==='pending');
  const payload={
    paid:paid.map(ex=>({datePaid:ex.datePaid||'',artistName:ex.artistName||'',expenseDescription:ex.expenseDescription||'',amount:ex.amount||0,currency:ex.currency||'',recoupablePercent:ex.recoupablePercent||0,recoupableAmount:ex.recoupableAmount||0,methodPaid:ex.methodPaid||'',participants:(ex.participants||[]).map(p=>p.name+' ('+p.share+'%)').join(', '),run:ex.runId?(S.runs.find(r=>r.id===ex.runId)?.name||''):'Unsubmitted',note:ex.note||''})),
    pending:pending.map(ex=>({requestedDate:(ex.createdAt||'').split('T')[0],artistName:ex.artistName||'',expenseDescription:ex.expenseDescription||'',amount:ex.amount||0,currency:ex.currency||'',recoupablePercent:ex.recoupablePercent||0,recoupableAmount:ex.recoupableAmount||0,participants:(ex.participants||[]).map(p=>p.name+' ('+p.share+'%)').join(', '),note:ex.note||''})),
    syncedAt:new Date().toISOString()
  };
  showToast('Syncing…');
  fetch('/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sheetsUrl:S.sheetsUrl,data:payload})})
    .then(async r=>{const j=await r.json().catch(()=>({}));return{httpOk:r.ok,body:j};})
    .then(({httpOk,body})=>{
      if(!httpOk||body.ok===false){showToast('Sync failed — '+(body.error||('upstream returned '+(body.status||'error'))));return;}
      const now=new Date();
      S.lastSynced=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
      showToast('Synced to Google Sheets ✓');
      if(S.view==='log')renderLog();
    })
    .catch(()=>showToast('Sync failed — check your URL'));
}

document.getElementById('nav').addEventListener('click',ev=>{
  const nav=ev.target.closest('[data-nav]');
  if(nav)setView(nav.dataset.nav);
});

loadState();
// If the URL hash already names a view (e.g. user reloaded on /#log), honour
// it; otherwise replace the empty hash with the current default so back/
// forward has a starting anchor to compare against.
{
  const h=_viewFromHash();
  if(h.view&&h.view!==S.view){S.view=h.view;}
  history.replaceState({view:S.view},'','#'+S.view);
}
renderAll();
</script>
